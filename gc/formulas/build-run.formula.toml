description = """
Durable back half for the build skill: implement, analyze gaps, review, fix,
and optionally publish.

Launch inputs:
- artifact_root: {{artifact_root}}
- context_path: {{context_path}} (empty means no extra implementation context)
- drain_policy: {{drain_policy}}
- initial_implementation_workflow_id: {{initial_implementation_workflow_id}} (empty means run initial implement)
- initial_summary_path: {{initial_summary_path}} (required when reusing an implementation)
- max_iterations: {{max_iterations}}
- push: {{push}}
- open_pr: {{open_pr}}
"""
formula = "build-run"
version = 1
contract = "graph.v2"
target_required = true
internal = true

[catalog]
name = "build-run"
description = "Run implementation, gap-analysis, review, fixes, and optional publish for an approved convoy."

[vars]
[vars.artifact_root]
description = "Build artifact root."
required = true

[vars.context_path]
description = "Implementation context bundle path."
default = ""

[vars.drain_policy]
description = "Implementation drain policy inherited by fix convoys."
default = "separate"

[vars.initial_implementation_workflow_id]
description = "Optional closed standalone implement workflow root to verify and reuse instead of rerunning initial implementation."
default = ""

[vars.initial_summary_path]
description = "Optional implementation summary path produced by the reused initial implementation workflow."
default = ""

[vars.max_iterations]
description = "Maximum attempts per gap/review loop."
default = "10"

[vars.push]
description = "Set true to allow final publish push after all loops pass."
default = "false"

[vars.open_pr]
description = "Set true to allow final PR creation after all loops pass."
default = "false"

[[steps]]
id = "implement-initial"
title = "Implement initial convoy"
metadata = { "gc.run_target" = "gc.implementation-worker" }
description = """
If initial_implementation_workflow_id {{initial_implementation_workflow_id}}
is empty, run implement on the approved initial convoy using context path
{{context_path}}, drain policy {{drain_policy}}, and artifact root
{{artifact_root}}. Stop and write final-report.md if implementation fails.

If initial_implementation_workflow_id is non-empty, this is a continuation of
a standalone implement run. Do not skip blindly. First verify all of:
- the referenced bead exists and is a closed graph.v2 workflow
- its title/formula/root key identifies the `implement` formula
- gc.input_convoy_id matches this build-run target convoy
- gc.outcome is pass
- initial_summary_path {{initial_summary_path}} is non-empty, exists, and is
  readable
- the referenced workflow drain manifest, if present, reports succeeded item
  roots or a recoverable summary explains any mismatch

If verification passes, record that the initial implementation was reused and
continue to gap-loop using initial_summary_path as the current implementation
subject. If verification fails, write final-report.md under {{artifact_root}}
with the failed check and stop.
"""

[[steps]]
id = "gap-loop"
title = "Run gap-analysis fix loop"
needs = ["implement-initial"]
metadata = { "gc.run_target" = "gc.gap-analyst" }
description = """
Run gap-analysis against the current implementation subject. For a reused
initial implementation, the first subject is initial_summary_path
{{initial_summary_path}}. Otherwise use the summary or diff produced by
implement-initial.

If {{artifact_root}} already contains a valid gap-analysis report for that
same subject and no later fix iteration has superseded it, reuse it as the
current gap verdict and record the reuse. Otherwise run the public
gap-analysis formula.

On failed verdict, create a fix convoy from the report findings and run
implement until pass or max_iterations {{max_iterations}} is exhausted. Preserve
context path {{context_path}} and drain policy {{drain_policy}} for fix work.
"""

[[steps]]
id = "review-loop"
title = "Run implementation review fix loop"
needs = ["gap-loop"]
metadata = { "gc.run_target" = "gc.implementation-reviewer" }
description = """
Run review. On failed verdict, create a fix convoy and run implement until pass
or max_iterations {{max_iterations}} is exhausted. Preserve artifact root
{{artifact_root}} for review and fix artifacts.
"""

[[steps]]
id = "finalize"
title = "Write final report"
needs = ["review-loop"]
metadata = { "gc.run_target" = "gc.run-operator" }
description = """
Write final-report.md under artifact root {{artifact_root}} for success,
failure, timeout, unavailable prerequisites, or recovery-required states.
"""

[[steps]]
id = "publish"
title = "Optionally publish successful build"
needs = ["finalize"]
metadata = { "gc.run_target" = "gc.publisher" }
description = """
If push {{push}} or open_pr {{open_pr}} are explicit opt-ins and final report
passed, run publish through the pack publisher role.
"""
