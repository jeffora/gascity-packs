description = """
Default bug report investigation workflow skeleton.

This formula is a base-pack extension point for richer bug investigation
flows. The default skeleton preserves the lifecycle shape from report intake
through classification and optional implementation dispatch; local packs can
override individual steps with deeper investigation behavior.
"""
formula = "bug-report-flow"
version = 1
contract = "graph.v2"

[catalog]
name = "bug-report-flow"
description = "Investigate a bug report through intake, reproduction, classification, and optional implementation dispatch."

[vars.report_ref]
description = "GitHub issue reference."
required = true

[vars.run_mode]
description = "Execution mode: start, resume, fresh, abort, or purge."
default = "start"

[[steps]]
id = "body"
title = "Bug report body scope"
needs = ["bootstrap-run", "refresh-intake", "historical-baseline", "reported-build-repro", "main-repro", "code-path-audit", "coverage-audit", "related-refs-audit", "investigation-synthesis", "followup-evidence", "normalize-outcome", "verify-normalized-outcome", "approve-classification", "verify-classification-approval", "publish-classification", "dispatch-implementation"]
description = "Terminal latch for the bug report investigation workflow."
metadata = { "gc.kind" = "scope", "gc.scope_name" = "bug-report-flow", "gc.scope_role" = "body" }

[[steps]]
id = "bootstrap-run"
title = "Resolve report and adopt source bead"
description = "Resolve report reference `{{report_ref}}` in run mode `{{run_mode}}`, validate prerequisites, and adopt or create the canonical source bead."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "refresh-intake"
title = "Refresh intake snapshot"
needs = ["bootstrap-run"]
description = "Refresh the issue snapshot and normalized run state."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "historical-baseline"
title = "Acquire historical baseline"
needs = ["refresh-intake"]
description = "Collect historical baseline evidence when the report identifies an affected build or version."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "reported-build-repro"
title = "Reproduce reported build"
needs = ["historical-baseline"]
description = "Attempt bounded reproduction on the reported build or recorded baseline."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "main-repro"
title = "Reproduce current main"
needs = ["refresh-intake"]
description = "Attempt bounded reproduction on current main."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "code-path-audit"
title = "Audit code path"
needs = ["refresh-intake"]
description = "Inspect the suspected code path and validate the bug premise."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "coverage-audit"
title = "Audit coverage"
needs = ["refresh-intake"]
description = "Inspect current test coverage for the reported path."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "related-refs-audit"
title = "Inspect related refs"
needs = ["refresh-intake"]
description = "Inspect related references only when they are relevant to classification."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "investigation-synthesis"
title = "Synthesize investigation"
needs = ["historical-baseline", "reported-build-repro", "main-repro", "code-path-audit", "coverage-audit", "related-refs-audit"]
description = "Synthesize evidence into a classification packet."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "followup-evidence"
title = "Collect follow-up evidence"
needs = ["investigation-synthesis"]
description = "Perform one bounded follow-up evidence pass when the synthesis identifies a narrow gap."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "normalize-outcome"
title = "Normalize outcome"
needs = ["followup-evidence"]
description = "Normalize the classification and selected next path."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "verify-normalized-outcome"
title = "Verify normalized outcome"
needs = ["normalize-outcome"]
description = "Verify outcome invariants before human approval."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "approve-classification"
title = "Approve classification"
needs = ["verify-normalized-outcome"]
description = "Ask for human approval of the classification and next path when policy requires it."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "verify-classification-approval"
title = "Verify classification approval"
needs = ["approve-classification"]
description = "Verify the durable classification approval artifact."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "publish-classification"
title = "Publish classification"
needs = ["verify-classification-approval"]
description = "Publish approved public classification updates."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "dispatch-implementation"
title = "Dispatch implementation when needed"
needs = ["publish-classification"]
description = "Dispatch the implementation workflow only when the approved classification requires code or test changes."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "verify-run-state"
title = "Verify terminal run state"
needs = ["body"]
description = "Verify terminal local run state."
metadata = { "gc.kind" = "cleanup", "gc.scope_ref" = "body", "gc.scope_role" = "teardown", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "cleanup-run-state"
title = "Clean up run state"
needs = ["body"]
description = "Finalize run state and optionally purge local artifacts."
metadata = { "gc.kind" = "cleanup", "gc.scope_ref" = "body", "gc.scope_role" = "teardown", "gc.run_target" = "gc.run-operator" }
