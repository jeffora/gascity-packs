description = """
Full lifecycle implementation formula for one implementation convoy or a core
drain-unit convoy of size one.

Launch inputs:
- context_path: {{context_path}} (empty means no extra context bundle)
- summary_path: {{summary_path}} (empty means use the default item summary path)
"""
formula = "do-work"
version = 1
contract = "graph.v2"
target_required = true

[vars]
[vars.context_path]
description = "Optional context bundle path."
default = ""

[vars.summary_path]
description = "Optional per-item summary path."
default = ""

[[steps]]
id = "prepare-worktree"
title = "Prepare item worktree"
metadata = { "gc.run_target" = "gc.run-operator" }
description = """
Resolve and publish the isolated worktree for this item. This is infrastructure
setup only. Do not edit source files in the launcher checkout.

1. Read current step bead metadata and get `gc.root_bead_id`; hard-fail if it is
   missing. Read that do-work root with `bd show <root-bead-id> --json`.
2. Resolve `<source-anchor-id>` from the do-work root:
   - read root metadata `gc.input_convoy_id`; hard-fail if it is missing
   - read that input convoy with `bd show <input-convoy-id> --json`
   - if input convoy metadata has `gc.synthetic_kind=drain-unit-convoy`, use
     input convoy metadata `gc.drain_member_id`
   - otherwise use `<input-convoy-id>` as the source anchor
   - if root metadata also has `gc.drain_member_id`, it must match the selected
     drain member
3. Validate context path {{context_path}}, files ownership, and verification
   policy for the resolved source anchor.
4. Create or reuse a deterministic git worktree at
   `$(pwd)/worktrees/<source-anchor-id>`. If the path is missing, run
   `git worktree add "$WORKTREE" --detach HEAD`. If the path exists but is not
   the worktree for this repository, fail closed.
5. Persist the absolute path on the source anchor with
   `bd update <source-anchor-id> --set-metadata work_dir=<absolute worktree path>`.
   Verify the source anchor now has `work_dir` before closing this step with
   `gc.outcome=pass`.
"""

[[steps]]
id = "implement"
title = "Implement owned work"
needs = ["prepare-worktree"]
metadata = { "gc.run_target" = "gc.implementation-worker" }
description = """
Resolve `<source-anchor-id>` using the same rules as `prepare-worktree`. Read `work_dir` from the source anchor, validate that it is an absolute existing git
worktree, set `WORKTREE` to that path, then `cd "$WORKTREE"` before reading or
editing source files. If `work_dir` is missing, invalid, or points at the
launcher checkout, fail this step before editing.

Do not edit files in the launcher checkout. Implement only the owned source
anchor boundary, run sandboxed verification from inside the worktree, and make a
focused commit in the worktree. Leave the source anchor open for
`close-source-anchor`; close only this implementation step when done.
"""

[[steps]]
id = "close-source-anchor"
title = "Close owned source anchor"
needs = ["implement"]
metadata = { "gc.run_target" = "gc.run-operator" }
description = """
Resolve `<source-anchor-id>` using the same rules as `prepare-worktree`. Read `work_dir` from the source anchor and verify the implementation commit and
summary evidence are present in that worktree. Write per-item summary to
{{summary_path}} when set.

On success, close only `<source-anchor-id>` with `gc.outcome=pass`. Read the
source anchor back with `bd show <source-anchor-id> --json` and verify
`status=closed` and `gc.outcome=pass`; if either check fails, fix the source
anchor before closing this step. Then close this step. Do not close the
drain-unit convoy, parent convoy, or broader workflow root from this step.
"""
