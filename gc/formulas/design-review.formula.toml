description = """
Default design review workflow skeleton.

The default formula reviews a design document and finalizes the input convoy.
Advanced packs can override the `design-review` step with multi-agent review
graphs while preserving launch and finalization semantics.
"""
formula = "design-review"
version = 1
contract = "graph.v2"

[catalog]
name = "design-review"
description = "Review and refine a design document until it is approved or blocked."

[vars.design_doc]
description = "Primary design document path, relative to the rig root."
required = true

[vars.context_files]
description = "Comma-separated context document paths, relative to the rig root."
default = ""

[vars.artifact_dir]
description = "Artifact directory relative to the rig root."
required = true

[vars.notify]
description = "Mailbox for terminal notification; set to none to suppress."
default = "human"

[[steps]]
id = "body"
title = "Design review body scope"
needs = ["design-review"]
description = "Terminal latch for the design-review workflow."
metadata = { "gc.kind" = "scope", "gc.scope_name" = "design-review", "gc.scope_role" = "body" }

[[steps]]
id = "design-review"
title = "Review design"
description = "Review `{{design_doc}}` with context `{{context_files}}`, write artifacts under `{{artifact_dir}}`, and update the design until it is approved or blocked."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.review-synthesizer" }

[[steps]]
id = "finalize"
title = "Finalize design-review workflow"
needs = ["body"]
description = "Finalize the input convoy, write a terminal summary under `{{artifact_dir}}`, and notify `{{notify}}`."
metadata = { "gc.kind" = "cleanup", "gc.scope_ref" = "body", "gc.scope_role" = "teardown", "gc.run_target" = "gc.run-operator" }
