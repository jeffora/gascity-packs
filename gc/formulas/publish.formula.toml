description = """
Internal helper for explicit opt-in push and PR creation.

Launch inputs:
- final_report: {{final_report}}
- push: {{push}}
- open_pr: {{open_pr}}
"""
formula = "publish"
version = 1
contract = "graph.v2"
target_required = false
internal = true

[vars]
[vars.final_report]
description = "Final report path to publish from."
required = true

[vars.push]
description = "Positive authorization to push."
default = "false"

[vars.open_pr]
description = "Positive authorization to open a PR."
default = "false"

[[steps]]
id = "preflight"
title = "Run publish preflight"
description = """
Validate auth, token scope, remote, branch names, PR base, collision policy,
protected/default targets, sanitized metadata, final report {{final_report}},
push authorization {{push}}, and open_pr authorization {{open_pr}}.
"""

[[steps]]
id = "push"
title = "Push branch if authorized"
needs = ["preflight"]
description = """
If push is {{push}}, use create-if-absent or expected-object-id update only.
Fail closed if the remote cannot enforce atomic or lease-checked semantics.
"""

[[steps]]
id = "open-pr"
title = "Open PR if authorized"
needs = ["push"]
description = """
If open_pr is {{open_pr}}, create a PR only after push succeeds and sanitized
title/body from final report {{final_report}} pass policy.
"""
