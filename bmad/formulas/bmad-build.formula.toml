description = """
BMAD Method implementation of the Gas City build-base contract.

This formula vendors the BMAD lifecycle skills and maps BMAD phases onto
build-base stages, with BMAD implementation readiness kept after
epics/stories so it matches the upstream workflow.
"""
formula = "bmad-build"
version = 1
contract = "graph.v2"
extends = ["build-base"]
target_required = true

[catalog]
name = "bmad-build"
description = "Run build-base with vendored BMAD PRD, architecture, epics/stories, implementation readiness, implementation, and review skills."

[vars]
[vars.implementation_target]
description = "BMAD task implementation role."
default = "bmad.story-implementer"

[[steps]]
id = "requirements"
title = "BMAD PRD requirements"
needs = ["prepare"]
metadata = { "gc.run_target" = "bmad.prd-writer" }
description_file = "../assets/workflows/bmad-build/requirements.md"

[[steps]]
id = "plan"
title = "BMAD architecture plan"
needs = ["requirements"]
metadata = { "gc.run_target" = "bmad.architect" }
description_file = "../assets/workflows/bmad-build/plan.md"

[[steps]]
id = "plan-review"
title = "BMAD architecture handoff review"
needs = ["plan"]
metadata = { "gc.run_target" = "bmad.architect" }
description_file = "../assets/workflows/bmad-build/plan-review.md"

[[steps]]
id = "decompose"
title = "BMAD epics and stories"
needs = ["plan-review"]
metadata = { "gc.run_target" = "bmad.epic-story-decomposer" }
description_file = "../assets/workflows/bmad-build/decompose.md"

[[steps]]
id = "implementation-readiness"
title = "BMAD implementation readiness"
needs = ["decompose"]
metadata = { "gc.run_target" = "bmad.readiness-reviewer" }
description_file = "../assets/workflows/bmad-build/implementation-readiness.md"

[[steps]]
id = "implement"
title = "Drain BMAD story development"
needs = ["implementation-readiness"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-build/implement.md"

[steps.drain]
context = "separate"
formula = "bmad-story-development"
member_access = "exclusive"

[[steps]]
id = "implement-same-session"
title = "Drain BMAD story development in one shared session"
needs = ["implementation-readiness"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-build/implement-same-session.md"

[steps.drain]
context = "shared"
formula = "bmad-story-development-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

[[steps]]
id = "review"
title = "BMAD code review"
needs = ["implement", "implement-same-session"]
metadata = { "gc.run_target" = "bmad.bmad-review-synthesizer" }
expand = "bmad-code-review-flow"
expand_vars = { implementation_target = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-build/review.md"
